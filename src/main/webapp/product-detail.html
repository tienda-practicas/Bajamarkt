<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail - Bajamarkt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/detail.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">Bajamarkt</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="products.html">Products</a></li>
            <li class="breadcrumb-item active" id="breadcrumbName">Loading...</li>
        </ol>
    </nav>

    <div id="loadingState" class="text-center py-5">
        <div class="spinner-border text-success" role="status"></div>
        <p class="mt-3 text-muted">Loading product details...</p>
    </div>

    <div id="errorState" class="alert alert-danger d-none">
        Product not found. <a href="products.html">Back to products</a>
    </div>

    <div id="detailContent" class="d-none">
        <div class="card shadow-sm overflow-hidden">
            <div class="row g-0">
                <!-- Image column -->
                <div class="col-md-5 product-image-col">
                    <img id="prodImage" src="" alt="" class="product-image"
                         onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 200 200%22><rect fill=%22%23e9ecef%22 width=%22200%22 height=%22200%22/><text x=%22100%22 y=%22105%22 text-anchor=%22middle%22 fill=%22%23adb5bd%22 font-family=%22sans-serif%22>No image</text></svg>'">
                </div>

                <!-- Info column -->
                <div class="col-md-7">
                    <div class="card-body p-4">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <span class="text-muted small">Product #<span id="prodId"></span></span>
                            <span id="prodStockBadge"></span>
                        </div>

                        <h1 class="fw-bold mb-3" id="prodName"></h1>

                        <div class="price-tag mb-4">
                            <span class="price-symbol">€</span>
                            <span id="prodPrice"></span>
                        </div>

                        <dl class="detail-list">
                            <dt>Category</dt>
                            <dd><a href="#" id="prodCategoryLink" class="category-link"></a></dd>

                            <dt>Stock</dt>
                            <dd id="prodStockText"></dd>
                        </dl>

                        <hr>

                        <div class="d-flex gap-2 flex-wrap">
                            <a href="#" class="btn btn-primary" id="editBtn">Edit Product</a>
                            <a href="products.html" class="btn btn-outline-secondary">← Back to list</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/product-detail.js"></script>
</body>
</html>
