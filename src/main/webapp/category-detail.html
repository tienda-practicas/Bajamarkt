<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Category Detail - Bajamarkt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/detail.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">Bajamarkt</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <!-- Breadcrumb for context -->
    <nav aria-label="breadcrumb">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="categories.html">Categories</a></li>
            <li class="breadcrumb-item active" id="breadcrumbName">Loading...</li>
        </ol>
    </nav>

    <!-- Loading / error state -->
    <div id="loadingState" class="text-center py-5">
        <div class="spinner-border text-primary" role="status"></div>
        <p class="mt-3 text-muted">Loading category details...</p>
    </div>

    <div id="errorState" class="alert alert-danger d-none">
        Category not found. <a href="categories.html">Back to categories</a>
    </div>

    <!-- Detail content (hidden until loaded) -->
    <div id="detailContent" class="d-none">

        <!-- Header card with primary info -->
        <div class="card shadow-sm mb-4 detail-header">
            <div class="card-body">
                <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
                    <div>
                        <span class="text-muted small">Category #<span id="catId"></span></span>
                        <h1 class="display-5 fw-bold mb-2" id="catName"></h1>
                        <span id="catStatus"></span>
                    </div>
                    <div class="d-flex gap-2">
                        <a href="#" class="btn btn-outline-primary" id="editBtn">Edit</a>
                        <a href="categories.html" class="btn btn-outline-secondary">← Back</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <!-- Info column -->
            <div class="col-md-5">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Information</h5>
                    </div>
                    <div class="card-body">
                        <dl class="detail-list mb-0">
                            <dt>Description</dt>
                            <dd id="catDescription"></dd>

                            <dt>Status</dt>
                            <dd id="catStatusText"></dd>

                            <dt>Created on</dt>
                            <dd id="catCreatedAt"></dd>

                            <dt>Total products</dt>
                            <dd id="catProductCount">—</dd>
                        </dl>
                    </div>
                </div>
            </div>

            <!-- Products in this category -->
            <div class="col-md-7">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                        <h5 class="mb-0">Products in this category</h5>
                        <span class="badge bg-light text-dark" id="productCountBadge">0</span>
                    </div>
                    <div class="card-body p-0">
                        <div id="productsList"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/category-detail.js"></script>
</body>
</html>
