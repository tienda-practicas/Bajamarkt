<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Bajamarkt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="index.html">Bajamarkt</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                <li class="nav-item"><a class="nav-link active" href="products.html">Products</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0" id="formTitle">Add New Product</h5>
                </div>
                <div class="card-body">
                    <form id="productForm">
                        <input type="hidden" id="productId" value="">

                        <div class="mb-3">
                            <label for="categoryId" class="form-label">Category</label>
                            <select class="form-select" id="categoryId" required>
                                <option value="" disabled selected>Select a category...</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label">Product Name</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label for="price" class="form-label">Price (€)</label>
                            <input type="number" step="0.01" class="form-control" id="price" required>
                        </div>
                        <div class="mb-3">
                            <label for="stockQuantity" class="form-label">Stock Quantity</label>
                            <input type="number" class="form-control" id="stockQuantity" required>
                        </div>
                        <div class="mb-3">
                            <label for="image" class="form-label">Image URL</label>
                            <input type="url" class="form-control" id="image"
                                   placeholder="https://example.com/photo.jpg">
                            <div class="form-text">Paste a link to an image (optional).</div>
                        </div>
                        <div class="mb-3 text-center">
                            <img id="imagePreview" src="" alt=""
                                 class="img-thumbnail d-none" style="max-height: 150px;">
                        </div>
                        <button type="submit" class="btn btn-success w-100" id="submitBtn">Save Product</button>
                        <button type="button" class="btn btn-secondary w-100 mt-2 d-none" id="cancelBtn">Cancel Edit</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
                    <h5 class="mb-0">Product Inventory</h5>
                    <span class="badge bg-light text-dark" id="resultCount">0 results</span>
                </div>

                <!-- Search and filter bar -->
                <div class="card-body border-bottom bg-light">
                    <div class="row g-2 mb-2">
                        <div class="col-md-6">
                            <input type="text" class="form-control" id="searchInput"
                                   placeholder="Search by product name...">
                        </div>
                        <div class="col-md-5">
                            <select class="form-select" id="categoryFilter">
                                <option value="all">All categories</option>
                            </select>
                        </div>
                        <div class="col-md-1">
                            <button type="button" class="btn btn-outline-secondary w-100" id="clearFiltersBtn"
                                    title="Clear filters">✕</button>
                        </div>
                    </div>
                    <div class="row g-2">
                        <div class="col-md-4">
                            <select class="form-select form-select-sm" id="stockFilter">
                                <option value="all">All stock levels</option>
                                <option value="low">Low stock (1–10)</option>
                                <option value="out">Out of stock (0)</option>
                                <option value="ok">In stock (>10)</option>
                            </select>
                        </div>
                        <div class="col-md-4">
                            <input type="number" class="form-control form-control-sm" id="priceMin"
                                   placeholder="Min price (€)" step="0.01">
                        </div>
                        <div class="col-md-4">
                            <input type="number" class="form-control form-control-sm" id="priceMax"
                                   placeholder="Max price (€)" step="0.01">
                        </div>
                    </div>
                </div>

                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-striped table-hover mb-0 align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Cat ID</th>
                                <th>Price</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                            </thead>
                            <tbody id="productTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/products.js"></script>
</body>
</html>
